<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chubb Smart Insurance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Kanit', sans-serif; }
        body { background-color: #f4f7fb; display: flex; justify-content: center; min-height: 100vh; color: #0f172a; }
        .app-container { width: 100%; max-width: 440px; background-color: #f8fafc; position: relative; overflow-y: auto; box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.15); display: flex; flex-direction: column; height: 100vh; }
        .premium-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-radius: 20px; border: 1px solid rgba(226, 232, 240, 0.6); padding: 16px; margin-bottom: 12px; transition: all 0.3s; }
        .input-box-rounded { width: 100%; border-radius: 14px; text-align: center; outline: none; background: rgba(241, 245, 249, 0.8); font-weight: 800; font-size: 22px; height: 50px; border: 1px solid transparent; transition: all 0.2s; }
        .input-box-rounded:focus { background-color: #ffffff; border-color: #3b82f6; color: #2563eb; }
        .btn-active { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-inactive { color: #64748b; background: #f1f5f9; }
        .quick-pill { font-size: 11px; font-weight: 700; border-radius: 10px; flex: 1; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-overlay.show { display: flex; }
        .modal-card { background: white; width: 100%; max-width: 24rem; border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-item { color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-active { color: #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container no-scrollbar" id="app">
        <div class="pt-6 px-4 pb-2">
            <button onclick="openPlanModal()" class="w-full bg-gradient-to-br from-[#243c94] to-[#1e327a] rounded-[24px] py-5 shadow-xl text-white text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-white/5 group-active:bg-black/5 transition-colors"></div>
                <h1 id="planTitle" class="text-xl font-black">CI Extra Plus</h1>
                <p id="planSubtitle" class="text-[10px] opacity-70">ออมเงิน : ชดเชยโรคร้าย + TPD 2 เท่า</p>
            </button>
        </div>

        <div class="flex-1 px-4 pt-2 pb-24" id="mainContent">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="premium-card !p-1.5 flex h-[52px]">
                    <button id="mBtn" onclick="setGender('male')" class="flex-1 rounded-[14px] font-bold btn-active">ชาย</button>
                    <button id="fBtn" onclick="setGender('female')" class="flex-1 rounded-[14px] font-bold btn-inactive">หญิง</button>
                </div>
                <div class="premium-card !p-1.5 flex items-center justify-between h-[52px]">
                    <button onclick="changeAge(-1)" class="w-10 text-slate-400 active:text-blue-500"><i class="fas fa-minus"></i></button>
                    <input type="number" id="ageInput" value="30" class="w-12 bg-transparent text-center font-black text-xl border-none outline-none" oninput="calculate()">
                    <button onclick="changeAge(1)" class="w-10 text-slate-400 active:text-blue-500"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <div id="subPlanBox" class="premium-card !p-1.5 flex gap-1 h-[52px]">
                </div>

            <div id="hxSelectionBox" class="premium-card hidden">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">เลือกแผนหลัก HX (สุขภาพ)</p>
                <select id="hxPlan" class="w-full h-10 rounded-xl bg-slate-100 border-none px-3 font-bold text-sm" onchange="calculate()">
                    <option value="HX15">HX 1.5 ล้าน</option>
                    <option value="HX20">HX 2.0 ล้าน</option>
                    <option value="HX40">HX 4.0 ล้าน</option>
                    <option value="HX60">HX 6.0 ล้าน</option>
                    <option value="HX150">HX 15 ล้าน</option>
                    <option value="HX300">HX 30 ล้าน</option>
                </select>
            </div>

            <div id="extraAdvanceBox" class="grid grid-cols-2 gap-3 mb-3 hidden">
                <div class="premium-card !p-2 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Extra</p>
                    <button id="extraBtn" onclick="openPopup('extraModal')" class="text-sm font-black text-blue-600">ไม่เลือก <i class="fas fa-chevron-down ml-1"></i></button>
                </div>
                <div class="premium-card !p-2 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Advance</p>
                    <button id="advanceBtn" onclick="openPopup('advanceModal')" class="text-sm font-black text-blue-600">ไม่เลือก <i class="fas fa-chevron-down ml-1"></i></button>
                </div>
            </div>

            <div id="sumContainer" class="premium-card">
                <div class="flex justify-between items-center mb-3">
                    <span id="sumTitle" class="text-xs font-bold text-slate-500">วงเงินคุ้มครอง (บาท)</span>
                    <span class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold">คำนวณจากทุน</span>
                </div>
                <div id="sumPills" class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar">
                    </div>
                <input type="text" id="sumInput" class="input-box-rounded" value="1,000,000" oninput="handleInput(this, 'sum')">
            </div>

            <div id="premContainer" class="premium-card">
                <div class="flex justify-between items-center mb-3">
                    <span id="premTitle" class="text-xs font-bold text-slate-500">ออมเงิน (บาท/ปี)</span>
                    <span id="premBadge" class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-bold">คำนวณจากเบี้ย</span>
                </div>
                <div id="premPills" class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar">
                    </div>
                <input type="text" id="premInput" class="input-box-rounded text-blue-600" oninput="handleInput(this, 'prem')">
            </div>

            <div id="cashFlowBox" class="premium-card bg-emerald-50/50 border-emerald-100 hidden">
                <p class="text-xs font-bold text-emerald-700 mb-3">กระแสเงินสดที่ต้องการ (บาท/ปี)</p>
                <div id="cashPills" class="flex gap-1.5 mb-3">
                    </div>
                <input type="text" id="cashInput" class="input-box-rounded text-emerald-600" value="120,000" oninput="handleInput(this, 'cash')">
            </div>

            <div class="grid grid-cols-4 gap-3">
                <button id="actionBtn" onclick="triggerResult()" class="col-span-3 h-[58px] rounded-2xl bg-gradient-to-r from-blue-700 to-blue-900 text-white font-black shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">ตารางมูลค่า</button>
                <button onclick="shareAll()" class="h-[58px] rounded-2xl bg-emerald-500 text-white flex flex-col items-center justify-center shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform">
                    <i class="fas fa-share-nodes text-xl mb-0.5"></i>
                    <span class="text-[10px] font-bold">แชร์</span>
                </button>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[440px] mx-auto glass-nav pb-safe bg-white/90 backdrop-blur-xl border-t border-slate-100">
            <div class="flex justify-around items-center py-3 px-2">
                <div onclick="setView('main')" class="nav-item nav-active"><i class="fas fa-calculator text-xl mb-1"></i>คำนวณ</div>
                <div onclick="setView('table')" class="nav-item"><i class="fas fa-table-list text-xl mb-1"></i>ตาราง</div>
                <div class="nav-item -mt-8"><div class="w-14 h-14 bg-red-500 rounded-full flex items-center justify-center text-white shadow-xl ring-4 ring-white"><i class="fas fa-microphone text-xl"></i></div></div>
                <div onclick="setView('cash')" class="nav-item"><i class="fas fa-money-bill-trend-up text-xl mb-1"></i>CASH</div>
                <div onclick="setView('ai')" class="nav-item"><i class="fas fa-circle-nodes text-xl mb-1"></i>AI</div>
            </div>
        </div>
    </div>

    <div id="planModal" class="modal-overlay" onclick="closePopup('planModal')">
        <div class="modal-card !max-h-[80vh]" onclick="event.stopPropagation()">
            <div class="p-6 border-b"><h3 class="font-black text-lg">เลือกแบบประกัน</h3></div>
            <div id="planList" class="overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-card">
            <div class="bg-blue-900 p-6 text-white text-center relative">
                <button onclick="closePopup('resultModal')" class="absolute top-4 right-4 text-2xl">&times;</button>
                <h3 class="text-xl font-bold">สรุปข้อมูลแผน</h3>
                <p class="text-xs opacity-70">รวมความคุ้มครอง TPD 2 เท่า</p>
            </div>
            <div id="resultContent" class="p-5 space-y-4 bg-slate-50"></div>
            <div class="p-4 grid grid-cols-2 gap-2">
                <button onclick="shareResult('prem')" class="bg-slate-100 py-3 rounded-xl font-bold text-sm">แชร์ออมเงิน</button>
                <button onclick="shareResult('all')" class="bg-emerald-500 text-white py-3 rounded-xl font-bold text-sm">แชร์ทั้งหมด</button>
            </div>
        </div>
    </div>

    <div id="pdfTarget" class="hidden"></div>

    <script>
        // CONFIG & STATE
        let state = {
            plan: "CI Extra Plus",
            subPlan: "20CX",
            gender: "male",
            age: 30,
            sum: 1000000,
            prem: 0,
            cash: 120000,
            hx: "HX15",
            extra: "ไม่เลือก",
            advance: "ไม่เลือก"
        };

        const PLANS = {
            "CI Extra Plus": { subtitle: "ออมเงิน : ชดเชยโรคร้าย + TPD 2 เท่า", subPlans: ["10CX", "20CX"], type: "modal", pills: [100000, 500000, 1000000, 3000000, 5000000] },
            "Life Protector 20": { subtitle: "มรดก + เงินคืนก้อนใหญ่ตอนครบสัญญา", subPlans: ["20LPB"], type: "table", pills: [] },
            "Supreme Life Protector": { subtitle: "คุ้มครองชีวิตสูง พร้อมเงินคืน", subPlans: ["20SLPA"], type: "table", pills: [] },
            "Whole Life Extra": { subtitle: "สร้างกระแสเงินสดตลอดชีพ", subPlans: ["WXN10", "WXN15"], type: "table", hasCash: true, pills: [500000, 1000000, 3000000, 5000000] },
            "Signature Legacy": { subtitle: "ส่งต่อความมั่งคั่งให้ทายาท", subPlans: ["SLB5", "SLB10"], type: "table", pills: [5000000, 10000000, 50000000, 100000000], label: "เบี้ยประกัน (บาท/ปี)" },
            "Century Life + TPD": { subtitle: "มรดก 100 ปี + TPD 2 เท่า", subPlans: ["10CL", "20CL", "60CL", "90CL"], type: "modal", pills: [100000, 500000, 1000000, 5000000] },
            "3D Health Excellence": { subtitle: "ประกันสุขภาพที่ออกแบบได้เอง", subPlans: ["10CL", "20CL", "60CL", "90CL"], type: "table", is3D: true, pills: [100000, 500000, 1000000] },
            "24 TX": { subtitle: "สร้างเงินก้อนใน 24 ปี", subPlans: ["TX24"], type: "table", hasCash: true, pills: [500000, 1000000, 3000000] },
            "868 Elite Saving": { subtitle: "ออมสั้น รับเงินคืนสูง", subPlans: ["Elite868"], type: "table", hasCash: true, pills: [1000000, 2000000, 5000000] }
        };

        // UI RENDERERS
        function renderSubPlans() {
            const container = document.getElementById('subPlanBox');
            const planData = PLANS[state.plan];
            if (planData.subPlans.length <= 1) {
                container.classList.add('hidden');
                state.subPlan = planData.subPlans[0];
            } else {
                container.classList.remove('hidden');
                container.innerHTML = planData.subPlans.map(sp => `
                    <button onclick="setSubPlan('${sp}')" class="flex-1 rounded-[14px] font-bold text-xs ${state.subPlan === sp ? 'btn-active' : 'btn-inactive'}">${sp}</button>
                `).join('');
            }
        }

        function renderPills() {
            const sumPills = document.getElementById('sumPills');
            const planData = PLANS[state.plan];
            
            // Sum Pills
            if (planData.pills.length === 0) {
                document.getElementById('sumContainer').classList.add('hidden');
            } else {
                document.getElementById('sumContainer').classList.remove('hidden');
                sumPills.innerHTML = planData.pills.map(v => `
                    <div onclick="setSum(${v})" class="quick-pill btn-inactive">${(v/1000000 >= 1) ? v/1000000+'M' : v/1000+'K'}</div>
                `).join('');
            }

            // Cash Pills
            if (planData.hasCash) {
                document.getElementById('cashFlowBox').classList.remove('hidden');
                document.getElementById('cashPills').innerHTML = [120000, 300000, 600000, 1000000].map(v => `
                    <div onclick="setCash(${v})" class="quick-pill btn-inactive">${v.toLocaleString()}</div>
                `).join('');
            } else {
                document.getElementById('cashFlowBox').classList.add('hidden');
            }
        }

        // LOGIC & CALCULATION
        function calculate() {
            // Placeholder logic until data_premium.js is filled
            const baseRate = 25.5; // Dummy rate
            const rawSum = state.sum;
            state.prem = Math.round((rawSum / 1000) * baseRate);
            
            if (PLANS[state.plan].is3D) {
                // 3D Specific: Sum CL + Sum 3D + etc.
                state.prem += 15000; // Dummy health rider cost
            }

            document.getElementById('premInput').value = state.prem.toLocaleString();
            document.getElementById('sumInput').value = state.sum.toLocaleString();
            
            // Dynamic Button Name
            document.getElementById('actionBtn').innerText = (PLANS[state.plan].type === "table") ? "ตารางมูลค่า" : "ดูรายละเอียด";
        }

        // ACTIONS
        function setPlan(p) {
            state.plan = p;
            state.subPlan = PLANS[p].subPlans[0];
            document.getElementById('planTitle').innerText = p;
            document.getElementById('planSubtitle').innerText = PLANS[p].subtitle;
            document.getElementById('premTitle').innerText = PLANS[p].label || "ออมเงิน (บาท/ปี)";
            
            // 3D & HX Logic
            document.getElementById('hxSelectionBox').classList.toggle('hidden', !PLANS[p].is3D);
            document.getElementById('extraAdvanceBox').classList.toggle('hidden', !PLANS[p].is3D);

            renderSubPlans();
            renderPills();
            calculate();
            closePopup('planModal');
        }

        function handleInput(el, key) {
            let val = parseInt(el.value.replace(/,/g, '')) || 0;
            state[key] = val;
            el.value = val.toLocaleString();
            calculate();
        }

        function setSum(v) { state.sum = v; calculate(); }
        function setCash(v) { state.cash = v; document.getElementById('cashInput').value = v.toLocaleString(); calculate(); }
        function changeAge(v) { state.age = Math.max(0, Math.min(65, state.age + v)); document.getElementById('ageInput').value = state.age; calculate(); }
        function setGender(g) { 
            state.gender = g; 
            document.getElementById('mBtn').className = `flex-1 rounded-[14px] font-bold ${g==='male'?'btn-active':'btn-inactive'}`;
            document.getElementById('fBtn').className = `flex-1 rounded-[14px] font-bold ${g==='female'?'btn-active':'btn-inactive'}`;
            calculate(); 
        }
        function setSubPlan(sp) { state.subPlan = sp; renderSubPlans(); calculate(); }

        // MODALS CONTROL
        function openPlanModal() {
            const list = document.getElementById('planList');
            list.innerHTML = Object.keys(PLANS).map(p => `
                <div onclick="setPlan('${p}')" class="p-4 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-between active:bg-blue-50 transition-colors">
                    <div>
                        <p class="font-bold text-slate-800">${p}</p>
                        <p class="text-[10px] text-slate-500">${PLANS[p].subtitle}</p>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300"></i>
                </div>
            `).join('');
            openPopup('planModal');
        }

        function openPopup(id) { document.getElementById(id).classList.add('show'); }
        function closePopup(id) { document.getElementById(id).classList.remove('show'); }

        function triggerResult() {
            if (PLANS[state.plan].type === "table") {
                switchView('table');
            } else {
                renderResultContent();
                openPopup('resultModal');
            }
        }

        function renderResultContent() {
            const content = document.getElementById('resultContent');
            content.innerHTML = `
                <div class="bg-white p-4 rounded-2xl border-l-4 border-blue-600 shadow-sm">
                    <p class="text-xs text-slate-400 uppercase font-bold">ออมเงินต่อปี</p>
                    <p class="text-2xl font-black text-blue-700">${state.prem.toLocaleString()} <span class="text-sm">บาท</span></p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-l-4 border-emerald-500 shadow-sm">
                    <p class="text-xs text-slate-400 uppercase font-bold">ทุนประกัน (กรณีเสียชีวิต)</p>
                    <p class="text-2xl font-black text-emerald-600">${state.sum.toLocaleString()} <span class="text-sm">บาท</span></p>
                </div>
                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-xs font-bold text-amber-700 mb-1"><i class="fas fa-shield-halved mr-1"></i> สิทธิประโยชน์เพิ่มเติม TPD</p>
                    <p class="text-[11px] text-amber-800 leading-relaxed">กรณีทุพพลภาพสิ้นเชิงถาวร รับความคุ้มครองเพิ่มเป็น 2 เท่า หรือ ${(state.sum*2).toLocaleString()} บาท</p>
                </div>
            `;
        }

        function switchView(view) {
            if (view === 'table') {
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('tableView').classList.remove('hidden');
                generateTable();
            } else {
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('tableView').classList.add('hidden');
            }
        }

        function generateTable() {
            document.getElementById('tableHeaderTitle').innerText = `${state.subPlan} - อายุ ${state.age} (${state.gender==='male'?'ชาย':'หญิง'})`;
            const head = document.getElementById('policyTableHead');
            head.innerHTML = `<tr><th class="p-3">ปี/อายุ</th><th class="p-3">ออมสะสม</th><th class="p-3">เงินสดคืน</th><th class="p-3">ความคุ้มครอง</th></tr>`;
            // Table row logic goes here...
        }

        window.onload = () => { setPlan("CI Extra Plus"); };
    </script>
</body>
</html>
