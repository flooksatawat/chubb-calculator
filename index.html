<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chubb Insurance Smart Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7fb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #0f172a; overscroll-behavior-y: none; }
        .app-container { width: 100%; max-width: 440px; height: 100vh; background-color: #f8fafc; display: flex; flex-direction: column; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.15); }
        @media (min-width: 450px) { .app-container { height: 95vh; border-radius: 40px; border: 6px solid #ffffff; } }
        .content-area { flex: 1; overflow-y: auto; padding: 0 16px; position: relative; z-index: 10; }
        .premium-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-radius: 20px; border: 1px solid rgba(226, 232, 240, 0.6); padding: 16px; margin-bottom: 12px; }
        .input-box-rounded { width: 100%; border-radius: 14px; text-align: center; outline: none; background: rgba(241, 245, 249, 0.8); font-weight: 800; font-size: 22px; height: 50px; border: 1px solid transparent; }
        .input-box-rounded:focus { background-color: #ffffff; border-color: #3b82f6; color: #2563eb; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25); }
        .quick-pill { font-size: 11px; font-weight: 700; border-radius: 10px; background: #f1f5f9; color: #64748b; flex: 1; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-overlay.show { display: flex; }
        .modal-card { background: white; width: 100%; max-width: 24rem; border-radius: 36px; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-item { color: #94a3b8; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: bold; }
        .nav-item.active { color: #2563eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="pt-6 px-4 pb-2 z-20">
            <button onclick="openPlanModal()" class="w-full bg-gradient-to-br from-[#243c94] to-[#1e327a] rounded-[24px] py-4 text-white shadow-xl flex flex-col items-center">
                <h1 id="headerTitle" class="text-[20px] font-black">CI Extra Plus</h1>
                <p id="headerSubtitle" class="text-[10px] opacity-80 font-medium">ออมเงิน : ชดเชยโรคร้าย + วงเงินพิเศษ</p>
            </button>
        </div>

        <div class="content-area pt-4 no-scrollbar">
            <div class="flex flex-col gap-3 pb-24">
                <div class="grid grid-cols-2 gap-3">
                    <div class="premium-card !p-1.5 flex h-[50px]">
                        <button id="mBtn" onclick="setGender('male')" class="flex-1 rounded-[14px] font-bold btn-blue">ชาย</button>
                        <button id="fBtn" onclick="setGender('female')" class="flex-1 rounded-[14px] font-bold text-slate-500">หญิง</button>
                    </div>
                    <div class="premium-card !p-1.5 flex items-center justify-between h-[50px]">
                        <button onclick="changeAge(-1)" class="w-10 text-slate-400"><i class="fas fa-minus"></i></button>
                        <input type="number" id="ageInput" value="30" class="w-14 bg-transparent text-center font-black text-[22px]" oninput="calculate()">
                        <button onclick="changeAge(1)" class="w-10 text-slate-400"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div id="subPlanWrapper" class="premium-card !p-1.5 flex h-[50px] gap-1"></div>

                <div id="hxSelectionBox" class="premium-card !p-2 hidden">
                    <p class="text-[10px] font-bold text-slate-400 uppercase text-center mb-1">เลือกแผนหลัก HX (สุขภาพ)</p>
                    <select id="hxPlan" class="w-full h-10 rounded-xl bg-slate-100 border-none px-3 font-bold text-sm" onchange="calculate()">
                        <option value="HX15">HX 1.5 ล้าน</option><option value="HX20">HX 2.0 ล้าน</option>
                        <option value="HX40">HX 4.0 ล้าน</option><option value="HX60">HX 6.0 ล้าน</option>
                        <option value="HX150">HX 15 ล้าน</option><option value="HX300">HX 30 ล้าน</option>
                    </select>
                </div>

                <div id="extraAdvanceBox" class="grid grid-cols-2 gap-3 hidden">
                    <div class="premium-card !p-2 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Extra</p>
                        <select id="extraOption" class="w-full bg-transparent border-none font-bold text-blue-600 text-sm" onchange="calculate()">
                            <option value="none">ไม่เลือก</option><option value="HXO10">HXO10</option>
                            <option value="HXO20">HXO20</option><option value="HXO30">HXO30</option>
                        </select>
                    </div>
                    <div class="premium-card !p-2 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Advance</p>
                        <select id="advanceOption" class="w-full bg-transparent border-none font-bold text-blue-600 text-sm" onchange="calculate()">
                            <option value="none">ไม่เลือก</option><option value="HXD100">HXD100</option>
                            <option value="HXD200">HXD200</option><option value="HXD500">HXD500</option><option value="HXD1000">HXD1000</option>
                        </select>
                    </div>
                </div>

                <div id="tpdBox" class="premium-card hidden">
                    <p class="text-xs font-bold text-slate-500 mb-2">ระบุวงเงิน TPD (บาท)</p>
                    <input type="text" id="tpdInput" class="input-box-rounded" value="1,000,000" oninput="handleCurrencyInput(this)">
                </div>

                <div id="sumContainer" class="premium-card">
                    <p id="sumLabel" class="text-xs font-bold text-slate-500 mb-2">วงเงินคุ้มครอง (บาท)</p>
                    <div id="sumPills" class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar"></div>
                    <input type="text" id="sumInput" class="input-box-rounded" value="1,000,000" oninput="handleCurrencyInput(this)">
                </div>

                <div id="premContainer" class="premium-card">
                    <p id="premLabel" class="text-xs font-bold text-slate-500 mb-2">ออมเงิน (บาท/ปี)</p>
                    <div id="premPills" class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar"></div>
                    <input type="text" id="premInput" class="input-box-rounded text-blue-600" oninput="handleCurrencyInput(this)">
                </div>

                <div id="cashFlowBox" class="premium-card bg-emerald-50/50 border-emerald-100 hidden">
                    <p class="text-xs font-bold text-emerald-700 mb-2">กระแสเงินสด (บาท/ปี)</p>
                    <div id="cashPills" class="flex gap-1.5 mb-3"></div>
                    <input type="text" id="cashInput" class="input-box-rounded text-emerald-600" value="120,000" oninput="handleCurrencyInput(this)">
                </div>

                <div class="grid grid-cols-4 gap-3 mt-2">
                    <button id="mainActionBtn" onclick="handleMainAction()" class="col-span-3 h-[56px] rounded-2xl bg-gradient-to-r from-blue-700 to-blue-900 text-white font-black shadow-lg">ดูรายละเอียด</button>
                    <button onclick="shareAll()" class="bg-emerald-500 text-white rounded-2xl flex flex-col items-center justify-center text-[10px] font-bold">
                        <i class="fas fa-share-nodes text-xl mb-1"></i>แชร์
                    </button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 glass-nav pb-safe bg-white/90 backdrop-blur-xl border-t border-slate-100">
            <div class="flex justify-around items-center py-3">
                <div onclick="switchView('main')" id="navMain" class="nav-item active"><i class="fas fa-calculator text-xl mb-1"></i>คำนวณ</div>
                <div onclick="switchView('table')" id="navTable" class="nav-item"><i class="fas fa-table-list text-xl mb-1"></i>ตาราง</div>
                <div class="nav-item -mt-8"><div class="w-14 h-14 bg-red-500 rounded-full flex items-center justify-center text-white shadow-xl ring-4 ring-white"><i class="fas fa-microphone"></i></div></div>
                <div onclick="switchView('cash')" id="navCash" class="nav-item"><i class="fas fa-money-bill-trend-up text-xl mb-1"></i>CASH</div>
                <div onclick="switchView('ai')" id="navAi" class="nav-item"><i class="fas fa-circle-nodes text-xl mb-1"></i>AI</div>
            </div>
        </div>
    </div>

    <div id="planModal" class="modal-overlay" onclick="closePopup('planModal')">
        <div class="modal-card !max-h-[80vh]" onclick="event.stopPropagation()">
            <div class="p-6 border-b flex justify-between items-center"><h3 class="font-black text-lg">แบบประกัน</h3><button onclick="closePopup('planModal')" class="text-slate-400 text-2xl">&times;</button></div>
            <div id="planList" class="overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-card">
            <div class="bg-blue-900 p-6 text-white text-center relative">
                <button onclick="closePopup('resultModal')" class="absolute top-4 right-4 text-2xl">&times;</button>
                <h3 class="text-xl font-bold">สรุปผลการคำนวณ</h3>
            </div>
            <div id="resultContent" class="p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 grid grid-cols-2 gap-2 bg-white">
                <button onclick="shareResult('prem')" class="bg-slate-100 py-3 rounded-xl font-bold text-sm">แชร์ออมเงิน</button>
                <button onclick="shareResult('all')" class="bg-emerald-500 text-white py-3 rounded-xl font-bold text-sm">แชร์ทั้งหมด</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
